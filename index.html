<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur 2026 - Saint-Paul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .glass { background: rgba(248, 250, 252, 0.8); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md card p-6 mt-4">
        <!-- Entête -->
        <div class="flex items-center justify-between mb-6 border-b pb-4">
            <div>
                <h1 class="text-xl font-black text-slate-900">🗳️ MUNICIPALES 2026</h1>
                <p class="text-blue-600 text-[10px] font-bold uppercase tracking-widest">Saint-Paul • 11 Élus</p>
            </div>
            <button onclick="resetForm()" class="p-2 text-slate-400 hover:text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </div>

        <!-- Saisie -->
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Votants</label>
                    <input type="number" id="votants" placeholder="0" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-200 font-bold">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Blancs/Nuls</label>
                    <input type="number" id="nuls" placeholder="0" class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-200 font-bold">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 glass rounded-2xl text-center">
                    <label class="block text-[9px] font-black text-blue-600 uppercase mb-1">Liste A</label>
                    <input type="number" id="voixA" placeholder="0" class="w-full text-2xl font-black bg-transparent outline-none text-blue-900 text-center">
                </div>
                <div class="p-4 glass rounded-2xl text-center">
                    <label class="block text-[9px] font-black text-rose-600 uppercase mb-1">Liste B</label>
                    <input type="number" id="voixB" placeholder="0" class="w-full text-2xl font-black bg-transparent outline-none text-rose-900 text-center">
                </div>
            </div>

            <button onclick="calculer()" class="w-full py-4 bg-slate-900 text-white font-black rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">
                Calculer la répartition
            </button>
        </div>

        <!-- Résultats -->
        <div id="resultats" class="mt-8 hidden animate-in fade-in">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="text-center p-4 bg-blue-50 border-2 border-blue-500 rounded-3xl">
                    <p class="text-[9px] font-bold text-blue-800 uppercase">Liste A</p>
                    <div id="resA" class="text-5xl font-black text-blue-600">0</div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Sièges</p>
                </div>
                <div class="text-center p-4 bg-rose-50 border-2 border-rose-500 rounded-3xl">
                    <p class="text-[9px] font-bold text-rose-800 uppercase">Liste B</p>
                    <div id="resB" class="text-5xl font-black text-rose-600">0</div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Sièges</p>
                </div>
            </div>

            <!-- Carré Noir (Calculs détaillés) -->
            <div class="bg-slate-900 rounded-2xl p-5 text-[11px] font-mono text-slate-300 space-y-3 shadow-inner">
                <p class="text-blue-400 font-bold border-b border-slate-700 pb-2 uppercase tracking-tighter">Détail des opérations</p>
                
                <div class="space-y-1">
                    <p class="text-slate-500 uppercase text-[9px] font-bold">1. Suffrages</p>
                    <p class="flex justify-between items-center bg-slate-800/50 p-2 rounded">
                        <span>Total exprimés :</span>
                        <span class="text-white font-bold" id="valEx">0</span>
                    </p>
                </div>

                <div class="space-y-1">
                    <p class="text-slate-500 uppercase text-[9px] font-bold">2. Prime majoritaire (50%)</p>
                    <p id="logPrime" class="bg-slate-800/50 p-2 rounded text-white"></p>
                </div>

                <div class="space-y-1">
                    <p class="text-slate-500 uppercase text-[9px] font-bold">3. Quotient (Calcul proportionnel)</p>
                    <div class="bg-slate-800/50 p-2 rounded space-y-1">
                        <p id="formulaQuotient" class="text-blue-300 font-bold"></p>
                        <p id="logQuotient" class="text-white"></p>
                    </div>
                </div>

                <div class="space-y-1 pt-1">
                    <p class="text-slate-500 uppercase text-[9px] font-bold">4. Attribution à la moyenne</p>
                    <div id="logMoy" class="bg-slate-800/50 p-2 rounded text-white space-y-2 border-l-2 border-blue-500"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function resetForm() {
            location.reload();
        }

        function calculer() {
            const v = parseInt(document.getElementById('votants').value) || 0;
            const n = parseInt(document.getElementById('nuls').value) || 0;
            const vA = parseInt(document.getElementById('voixA').value) || 0;
            const vB = parseInt(document.getElementById('voixB').value) || 0;
            const ex = v - n;

            if (ex <= 0 || (vA + vB) === 0) return;

            document.getElementById('valEx').innerText = ex;
            const winner = (vA >= vB) ? "A" : "B";
            
            // État initial des sièges
            let sA = (winner === "A") ? 6 : 0;
            let sB = (winner === "B") ? 6 : 0;

            document.getElementById('logPrime').innerText = "• Liste " + winner + " gagne : 6 sièges";

            // Calcul du quotient
            const quotient = ex / 5;
            document.getElementById('formulaQuotient').innerText = ex + " voix / 5 places = " + quotient.toFixed(2);
            
            let pA = Math.floor(vA / quotient);
            let pB = Math.floor(vB / quotient);
            
            document.getElementById('logQuotient').innerText = "A: " + pA + " siège(s) | B: " + pB + " siège(s)";

            sA += pA;
            sB += pB;

            let reste = 11 - (sA + sB);
            const logMoy = document.getElementById('logMoy');
            logMoy.innerHTML = "";

            if (reste === 0) {
                logMoy.innerHTML = "<p class='italic text-slate-500'>Aucun siège restant à la moyenne.</p>";
            }

            while (reste > 0) {
                // Calcul de la moyenne : voix / (sièges déjà acquis + 1)
                const mA = vA / (sA + 1);
                const mB = vB / (sB + 1);
                
                let details = "<div class='text-[10px] space-y-1'>";
                details += "<p class='text-slate-400'>Calcul Moyenne :</p>";
                details += "<p>A: " + vA + " / (" + sA + "+1) = <span class='text-blue-400'>" + mA.toFixed(2) + "</span></p>";
                details += "<p>B: " + vB + " / (" + sB + "+1) = <span class='text-rose-400'>" + mB.toFixed(2) + "</span></p>";
                
                if (mA >= mB) {
                    sA++;
                    details += "<p class='font-bold text-green-400'>→ Liste A gagne le siège</p>";
                } else {
                    sB++;
                    details += "<p class='font-bold text-green-400'>→ Liste B gagne le siège</p>";
                }
                details += "</div>";
                
                logMoy.innerHTML += details;
                reste--;
            }

            document.getElementById('resA').innerText = sA;
            document.getElementById('resB').innerText = sB;
            document.getElementById('resultats').classList.remove('hidden');
            
            // Scroll automatique vers les résultats
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
